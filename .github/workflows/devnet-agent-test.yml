name: Devnet Agent Test

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/devnet-agent-test.yml'
  workflow_dispatch:
    inputs:
      transact:
        description: 'Run the signed zero-SOL self-transaction test'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: devnet-agent-test
  cancel-in-progress: true

jobs:
  safety-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOLANA_RPC_URL: https://api.devnet.solana.com
      DEVNET_AGENT_KEYPAIR: ${{ secrets.DEVNET_AGENT_KEYPAIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Devnet network and wallet check
        run: npm run agent:check
      - name: Signed zero-SOL self-transaction
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.transact }}
        run: npm run agent:test
