name: Devnet Agent Test

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/devnet-agent-test.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: devnet-agent-test
  cancel-in-progress: true

jobs:
  devnet-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SOLANA_RPC_URL: https://api.devnet.solana.com
      DEVNET_AGENT_KEYPAIR: ${{ secrets.DEVNET_AGENT_KEYPAIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Devnet network and wallet check
        run: npm run agent:check

      - name: Signed zero-SOL self-transaction
        run: npm run agent:test

      - name: Create immutable 1-of-1 SPL mint
        run: npm run agent:token

      - name: Mint Metaplex Devnet NFT
        run: npm run agent:nft

      - name: Publish reports to workflow summary
        if: always()
        run: |
          for report in reports/*.md; do
            if [ -f "$report" ]; then
              cat "$report" >> "$GITHUB_STEP_SUMMARY"
              echo '' >> "$GITHUB_STEP_SUMMARY"
            fi
          done

      - name: Upload Devnet agent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devnet-agent-report-${{ github.run_number }}
          path: reports/
          if-no-files-found: warn
          retention-days: 14
