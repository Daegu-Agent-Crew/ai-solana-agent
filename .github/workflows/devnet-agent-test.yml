name: Devnet Agent Test

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/devnet-agent-test.yml'
  workflow_dispatch:
    inputs:
      nft_name:
        description: 'NFT name (maximum 32 UTF-8 bytes)'
        required: false
        default: 'AI Agent NFT'
        type: string
      nft_symbol:
        description: 'NFT symbol (maximum 10 UTF-8 bytes)'
        required: false
        default: 'AISOL'
        type: string
      metadata_uri:
        description: 'Public HTTPS metadata JSON URI'
        required: false
        default: 'https://daegu-agent-crew.github.io/ai-solana-agent/metadata/doctor-slump-001.json'
        type: string
      is_mutable:
        description: 'Allow metadata updates after minting'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: devnet-agent-test
  cancel-in-progress: true

jobs:
  devnet-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOLANA_RPC_URL: https://api.devnet.solana.com
      DEVNET_AGENT_KEYPAIR: ${{ secrets.DEVNET_AGENT_KEYPAIR }}
      NFT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.nft_name || '' }}
      NFT_SYMBOL: ${{ github.event_name == 'workflow_dispatch' && inputs.nft_symbol || 'AISOL' }}
      NFT_METADATA_URI: ${{ github.event_name == 'workflow_dispatch' && inputs.metadata_uri || 'https://daegu-agent-crew.github.io/ai-solana-agent/metadata/doctor-slump-001.json' }}
      NFT_IS_MUTABLE: ${{ github.event_name == 'workflow_dispatch' && inputs.is_mutable || false }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Devnet network and wallet check
        run: npm run agent:check

      - name: Mint Metaplex Devnet NFT with retries
        shell: bash
        run: |
          set -o pipefail
          mkdir -p reports
          for attempt in 1 2 3; do
            echo "NFT mint attempt ${attempt}/3"
            if npm run agent:nft 2>&1 | tee "reports/nft-attempt-${attempt}.log"; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 10))
            fi
          done
          exit 1

      - name: Publish latest result and mint history
        shell: bash
        run: |
          set -euo pipefail
          test -s reports/devnet-nft-report.json
          cp reports/devnet-nft-report.json latest-nft.json
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const latest = JSON.parse(fs.readFileSync('latest-nft.json', 'utf8'));
          let history = [];
          if (fs.existsSync('nft-history.json')) {
            const parsed = JSON.parse(fs.readFileSync('nft-history.json', 'utf8'));
            history = Array.isArray(parsed) ? parsed : [];
          }
          history = [latest, ...history.filter((item) => item?.mint !== latest.mint)].slice(0, 100);
          fs.writeFileSync('nft-history.json', JSON.stringify(history, null, 2) + '\n');
          NODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f latest-nft.json nft-history.json
          if git diff --cached --quiet; then
            echo "NFT result files unchanged"
            exit 0
          fi
          git commit -m "Archive Devnet NFT mint result [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Publish reports to workflow summary
        if: always()
        run: |
          for report in reports/*.md; do
            if [ -f "$report" ]; then
              cat "$report" >> "$GITHUB_STEP_SUMMARY"
              echo '' >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if ls reports/nft-attempt-*.log >/dev/null 2>&1; then
            echo '## NFT attempt logs' >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 120 reports/nft-attempt-*.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Devnet agent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devnet-agent-report-${{ github.run_number }}
          path: reports/
          if-no-files-found: warn
          retention-days: 14