<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070a12" />
  <title>AI Solana Agent</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell">
    <header class="hero">
      <span class="badge">Solana Devnet · Phantom</span>
      <h1>AI Solana Agent</h1>
      <p>Phantom 연결과 Devnet 트랜잭션을 브라우저에서 직접 실행합니다.</p>
    </header>

    <section class="card">
      <h2>1. Phantom 연결</h2>
      <p id="wallet">연결되지 않음</p>
      <button id="connect">Phantom 연결</button>
    </section>

    <section class="card">
      <h2>2. Devnet 상태</h2>
      <div class="row"><span>잔액</span><strong id="balance">-</strong></div>
      <button id="refresh" disabled>잔액 새로고침</button>
    </section>

    <section class="card">
      <h2>3. 테스트 트랜잭션</h2>
      <p>자기 지갑으로 0 SOL을 보내 Phantom 서명과 Devnet 전송을 검증합니다.</p>
      <button id="testTx" class="primary" disabled>0 SOL 테스트 승인</button>
      <a id="explorer" class="explorer hidden" target="_blank" rel="noreferrer">Explorer에서 확인</a>
    </section>

    <div id="status" class="status">페이지 준비 완료</div>
  </main>

  <script src="https://unpkg.com/@solana/web3.js@1.98.4/lib/index.iife.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
