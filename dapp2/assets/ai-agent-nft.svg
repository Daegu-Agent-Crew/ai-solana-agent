  <text x="600" y="1040" text-anchor="middle" font-family="Arial, sans-serif" font-size="74" font-weight="700" fill="#f8fafc">AI SOLANA AGENT</text>
  <text x="600" y="1110" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#a7f3d0">DEVNET EDITION</text>
</svg>
