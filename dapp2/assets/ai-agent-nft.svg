  </defs>
  <rect width="1200" height="1200" rx="120" fill="url(#bg)"/>
  <circle cx="600" cy="560" r="300" fill="none" stroke="url(#accent)" stroke-width="32"/>
  <path d="M390 640 L600 330 L810 640 L600 850 Z" fill="none" stroke="url(#accent)" stroke-width="34" stroke-linejoin="round"/>
  <circle cx="520" cy="565" r="28" fill="#14f195"/>
